services:
  docs-builder:
    build:
      context: .
      dockerfile: Dockerfile
    image: docs-idryer-org-builder:latest
    container_name: docs-idryer-org-builder
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # Домен сайта (canonical url / sitemap). По умолчанию — стейджинг new.docs.
      # Переключение на прод: SITE_URL=https://docs.idryer.org/ в .env (см. mkdocs.yml).
      SITE_URL: ${SITE_URL:-https://new.docs.idryer.org/}
    ports:
      # Отдельный порт от старого dev-движка (9001 занят idryer-docs-builder).
      - "127.0.0.1:9002:9000"
    cpus: 0.5
    volumes:
      # Отдельные путь/кэш — сосуществует со старым /opt/idryer-docs.
      - /opt/docs-idryer-org/site:/output
      - docs-idryer-org-build-cache:/build
      # rebuild.sh + hooks.json.template подмонтированы из репо.
      # Правка → git pull на сервере → docker-compose restart. Без build образа.
      - ./rebuild.sh:/app/rebuild.sh:ro
      - ./hooks.json.template:/app/hooks.json.template:ro
      - ./check-nav.py:/app/check-nav.py:ro

volumes:
  docs-idryer-org-build-cache:
