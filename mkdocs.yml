site_name: iDryer Docs
site_url: !ENV [SITE_URL, https://docs.idryer.org/]
site_description: Сборка, прошивка и эксплуатация устройств экосистемы iDryer, а также документация для разработчиков.

theme:
  name: material
  language: ru
  logo: img/iDryer-logo.svg
  favicon: img/iDryer-favicon.png
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
      primary: custom
      accent: red
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
      primary: custom
      accent: red
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.action.view
    - content.action.edit

extra:
  extra_asset_dirs:
    - CAD
    - KiCad
    - PDF
    - Schematics
  social:
    - icon: fontawesome/brands/discourse
      link: https://forum.idryer.org
    - icon: fontawesome/brands/square-youtube
      link: https://www.youtube.com/@iDryerProject
    - icon: fontawesome/brands/discord
      link: https://discord.gg/jGce5eeHHz
    - icon: fontawesome/brands/telegram
      link: https://t.me/iDryer
    - icon: fontawesome/brands/github-alt
      link: https://github.com/pavluchenkor

plugins:
  - search:
      lang:
        - ru
        - en
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: ru
          default: true
          name: Русский
          build: true
        - locale: en
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
        - locale: fr
          name: Français
          build: true
        - locale: es
          name: Español
          build: true
        - locale: cs
          name: Čeština
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: pt
          name: Português
          build: true
        - locale: pt-BR
          name: Português (Brasil)
          build: true
        - locale: zh
          name: 中文 (简体)
          build: true
        - locale: zh-Hant
          name: 中文 (繁體)
          build: true
  - awesome-pages
  - glightbox
  - optimize:
      # ВРЕМЕННО ОТКЛЮЧЁН: на сервере (CI=true) падал на on_env с
      # `files.remove ... '../../tmp/mkdocs-optimize-cache/img/iDryer-favicon.png' not in collection`,
      # из-за чего рушилась ВСЯ сборка. Картинки и так ресайзятся hooks/resize_images.py.
      # Доп. сжатие pngquant вернём отдельно, разобравшись с cache_dir/версией плагина.
      enabled: false
      cache_dir: /tmp/mkdocs-optimize-cache

hooks:
  - hooks/fix_i18n_nav_pre.py
  - hooks/resize_images.py
  - hooks/nav_order.py
  - hooks/edit_url.py
  - hooks/asset_links.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - abbr
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.betterem:
      smart_enable: all
  - toc:
      permalink: true
      toc_depth: 5

repo_url: https://github.com/pavluchenkor/docs-idryer-org
repo_name: docs-idryer-org
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/extra.css

copyright: |
  &copy; 2026 <a href="https://github.com/pavluchenkor" target="_blank" rel="noopener">Ruslan Pavluchenko</a>
