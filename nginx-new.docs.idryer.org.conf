# new.docs.idryer.org — пользовательская документация (mkdocs static)
#
# Клон схемы dev.idryer.org, но отдельный путь (/opt/docs-idryer-org/site) и порт
# (9002) — сосуществует со старым движком, ничего не пересекается.
#
# Кладётся на сервер в /etc/nginx/conf.d/new.docs.idryer.org.conf (nginx включает
# и conf.d/*.conf, и sites-enabled/*).
#
# ПЕРЕКЛЮЧЕНИЕ НА docs.idryer.org позже:
#   1) выпустить серт для docs.idryer.org (certbot webroot);
#   2) добавить docs.idryer.org в server_name ОБОИХ блоков (root и /hooks/ те же),
#      либо скопировать этот файл под docs.idryer.org;
#   3) SITE_URL=https://docs.idryer.org/ в .env движка + пересборка;
#   4) переключить DNS docs.idryer.org → сервер.

server {
    listen 80;
    server_name new.docs.idryer.org docs.idryer.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name new.docs.idryer.org docs.idryer.org;

    ssl_certificate     /etc/letsencrypt/live/new.docs.idryer.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.docs.idryer.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /opt/docs-idryer-org/site;
    index index.html;

    # Ассеты с content-hash в имени (main.484c7ddc.min.css, bundle.79ae519e.min.js)
    # — кешируем на год. expires не затирает server-level add_header (HSTS и пр.)
    location ~* "\.[a-f0-9]{8,}\.(min\.)?(js|css)$" {
        expires 1y;
        try_files $uri =404;
    }

    # Шрифты — immutable по природе
    location ~* \.(woff2?|ttf|eot)$ {
        expires 1y;
        try_files $uri =404;
    }

    # Изображения
    location ~* \.(png|jpe?g|gif|webp|svg|ico)$ {
        expires 30d;
        try_files $uri =404;
    }

    # Прочие CSS/JS без хеша (extra.css, glightbox.min.css/js)
    location ~* \.(css|js)$ {
        expires 7d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location /hooks/ {
        proxy_pass http://127.0.0.1:9002/hooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
