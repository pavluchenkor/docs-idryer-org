# ─────────────────────────────────────────────────────────────────────────
#  Карта продуктовых репозиториев → разделы сайта docs.idryer.org
#
#  Это ЕДИНСТВЕННОЕ место, где задаётся «какой репо в какой раздел».
#  Редактируется руками. Скрипт сборки rebuild.sh только читает этот файл —
#  лазить в скрипт не нужно.
#
#  Поля:
#    mount  — путь раздела на сайте. Вложенный путь = группа/подраздел.
#             docs/<язык>/ из репо кладётся в docs/<язык>/<mount>/
#             примеры:  development/core   projects/idryer/unit   wiki
#    url    — git-репозиторий
#    branch — ветка публикации (необязательно; по умолчанию docs-publish)
#
#  Подключить репо = убрать «#», проверить url и что в репо есть ветка docs-publish.
# ─────────────────────────────────────────────────────────────────────────

repos:
  # ───────────── Разработка ─────────────
  - mount: development/core
    url: https://github.com/pavluchenkor/idryer-core.git
  - mount: development/byod
    url: https://github.com/pavluchenkor/Build-Your-Own-iDryer.git

  # ───────────── Проекты ─────────────
  # Группа в меню = средний сегмент mount-пути: projects/<группа>/<продукт>.
  # Подпись группы задаётся в docs/<lang>/projects/.pages (напр. "- iDryer: idryer").
  #
  # ДВА ПРАВИЛА (иначе ломается сборка/навигация):
  #   1. Раскомментировать mount ТОЛЬКО когда у репо есть ветка docs-publish.
  #      Пустой mount создаёт пустую папку и ломает меню ветки projects.
  #   2. Подпись новой группы в projects/.pages добавляй, лишь когда её папка
  #      появилась (есть активный mount группы) — иначе NavEntryNotFound → краш.
  #      "- ..." в projects/.pages и так подхватит всё смонтированное.

  # — группа iDryer —
  # - mount: projects/idryer/controller
  #   url: https://github.com/pavluchenkor/iDryerController.git
  - mount: projects/idryer/controller-v2
    url: https://github.com/pavluchenkor/iDryerControllerV2.git
  - mount: projects/idryer/x
    url: https://github.com/pavluchenkor/iDryer-X.git
  - mount: projects/idryer/unit
    url: https://github.com/pavluchenkor/iDryer-Unit.git
  - mount: projects/idryer/link
    url: https://github.com/pavluchenkor/iDryer-Link.git
  # - mount: projects/idryer/screen
  #   url: https://github.com/pavluchenkor/iDryer-Screen.git

  # — группа iHeater (добавь "- iHeater: iheater" в projects/.pages при подключении) —
  - mount: projects/iheater/klipper
    url: https://github.com/pavluchenkor/iHeater.git
  - mount: projects/iheater/standalone
    url: https://github.com/pavluchenkor/iHeater-Standalone-Firmware.git
  - mount: projects/iheater/link
    url: https://github.com/pavluchenkor/iHeater-Link.git

  # — Storage (одиночный раздел) —
  - mount: projects/storage
    url: https://github.com/pavluchenkor/iDryer-Storage.git

  # — Portal (одиночный раздел) —
  # - mount: projects/portal
  #   url: https://github.com/pavluchenkor/iDryer-portal.git

  # ───────────── WiKi ─────────────
  - mount: wiki
    url: https://github.com/pavluchenkor/idryer-wiki.git
